<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>Quran AI Search</title>
    <style>
        body { font-family: sans-serif; background: #020617; color: white; text-align: center; padding: 20px; }
        .search-box { margin-bottom: 30px; }
        input { padding: 12px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 12px; border-radius: 5px; border: none; background: #2563eb; color: white; cursor: pointer; }
        #results { max-width: 800px; margin: auto; text-align: right; }
        .card { background: #0f172a; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #1e293b; }
        .arabic { font-size: 32px; margin-bottom: 15px; text-align: center; color: #f8fafc; direction: rtl; }
        .urdu { font-size: 18px; color: #93c5fd; margin-bottom: 15px; direction: rtl; }
        .aiBox { background: #064e3b; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; display: none; color: #dcfce7; }
        .loader { border: 4px solid #333; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>قرآن اے آئی سرچ</h1>

    <div class="search-box">
        <input id="topic" placeholder="موضوع لکھیں...">
        <button onclick="searchTopic()">تلاش کریں</button>
    </div>

    <div id="results"></div>

    <script>
        async function searchTopic() {
            const topic = document.getElementById("topic").value;
            const container = document.getElementById("results");
            if (!topic) return;

            container.innerHTML = '<div class="loader"></div>';

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/search/${topic}/all/en.sahih`);
                const data = await res.json();

                container.innerHTML = "";
                if (!data.data || data.data.matches.length === 0) {
                    container.innerHTML = "کوئی نتیجہ نہیں ملا";
                    return;
                }

                data.data.matches.slice(0, 5).forEach((ayah, index) => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <div style="text-align:left; font-size:12px; color:#64748b;">Surah ${ayah.surah.englishName} (${ayah.surah.number}:${ayah.numberInSurah})</div>
                        <div class="arabic">${ayah.text}</div>
                        <div class="urdu" id="urdu${index}">ترجمہ لوڈ ہو رہا ہے...</div>
                        <button onclick="explain('${ayah.text.replace(/'/g, "\\'")}', ${index})" style="background:transparent; border:1px solid #3b82f6; color:#3b82f6; padding:5px 10px; cursor:pointer;">AI تشریح</button>
                        <div class="aiBox" id="ai${index}"></div>
                    `;
                    container.appendChild(card);
                    loadUrdu(ayah.number, index);
                });
            } catch (e) {
                container.innerHTML = "Error loading data.";
            }
        }

        async function loadUrdu(number, index) {
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${number}/ur.jalandhry`);
            const data = await res.json();
            document.getElementById("urdu" + index).innerText = data.data.text;
        }

        async function explain(ayahText, index) {
            const topic = document.getElementById("topic").value;
            const box = document.getElementById("ai" + index);
            box.style.display = "block";
            box.innerHTML = "AI خلاصہ تیار کر رہا ہے...";

            try {
                const res = await fetch("/api/explain", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic, ayah: ayahText })
                });
                const data = await res.json();
                box.innerHTML = data.explanation.replace(/\*\*/g, "");
            } catch (e) {
                box.innerHTML = "Error getting explanation.";
            }
        }
    </script>
</body>
</html>
