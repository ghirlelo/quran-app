<!DOCTYPE html>
<html lang="ur">

<head>
  <meta charset="UTF-8">
  <title>قرآن سرچ</title>
  <style>
    body {
      font-family: "Segoe UI", Arial;
      background: #020617;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    input {
      padding: 14px;
      width: 320px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-left: 6px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #results {
      margin-top: 40px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      text-align: right;
    }

    .card {
      background: #0f172a;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
    }

    .info {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .arabic {
      font-size: 36px;
      direction: rtl;
      line-height: 2;
      margin-bottom: 15px;
      color: #f8fafc;
    }

    .urdu {
      font-size: 20px;
      direction: rtl;
      line-height: 1.8;
      color: #93c5fd;
      margin-bottom: 15px;
    }

    .audio {
      margin-bottom: 10px;
    }

    .aiBox {
      background: #052e16;
      padding: 12px;
      border-left: 4px solid #22c55e;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 16px;
      line-height: 1.6;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <h1>قرآن سرچ</h1>
  <input id="topic" placeholder="مثلاً زکاة، روزہ، صبر">
  <button onclick="searchTopic()">تلاش کریں</button>

  <div id="results"></div>

  <script>
    async function searchTopic() {
      let topic = document.getElementById("topic").value;
      let container = document.getElementById("results");

      if (!topic) return;

      container.innerHTML = '<div class="loader"></div>';

      // Search using English API (you can later improve for full Arabic/Urdu)
      let url = `https://api.alquran.cloud/v1/search/${topic}/all/en`;

      try {
        let res = await fetch(url);
        let data = await res.json();
        container.innerHTML = "";

        data.data.matches.slice(0, 5).forEach((ayah, index) => {
          let card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="info">
              سورة ${ayah.surah.name} (${ayah.numberInSurah})
            </div>

            <div class="arabic">
              ${ayah.text}
            </div>

            <div class="urdu" id="urdu${index}">
              ترجمہ لوڈ ہو رہا ہے...
            </div>

            <div class="audio">
              <audio controls src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayah.number}.mp3"></audio>
            </div>

            <button onclick="explain('${ayah.text}',${index})">
              تشریح
            </button>

            <div class="aiBox" id="ai${index}"></div>
          `;

          container.appendChild(card);
          loadUrdu(ayah.number, index);
        });
      } catch (err) {
        container.innerHTML = "کچھ غلط ہو گیا، دوبارہ کوشش کریں۔";
        console.error(err);
      }
    }

    async function loadUrdu(number, index) {
      let url = `https://api.alquran.cloud/v1/ayah/${number}/ur.jalandhry`;

      try {
        let res = await fetch(url);
        let data = await res.json();
        document.getElementById("urdu" + index).innerText = data.data.text;
      } catch (err) {
        document.getElementById("urdu" + index).innerText = "ترجمہ لوڈ نہیں ہو سکا۔";
        console.error(err);
      }
    }

    async function explain(text, index) {
      let box = document.getElementById("ai" + index);
      box.innerHTML = "تشریح آ رہی ہے...";

      try {
        let res = await fetch("/api/explain", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ayah: text })
        });

        let data = await res.json();
        box.innerHTML = data.explanation;
      } catch (err) {
        box.innerHTML = "تشریح حاصل نہیں ہو سکی۔";
        console.error(err);
      }
    }
  </script>
</body>

</html>
