<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <title>Quran AI Search</title>
  <style>
    body { font-family: "Segoe UI", Arial; background: #020617; color: white; text-align: center; padding: 40px; }
    h1 { font-size: 32px; margin-bottom: 20px; }
    .search-box { margin-bottom: 30px; }
    input { padding: 14px; width: 320px; font-size: 16px; border-radius: 8px; border: none; outline: none; }
    button.main-btn { padding: 14px 18px; font-size: 16px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; margin-left: 6px; }
    #results { margin-top: 40px; max-width: 900px; margin: auto; text-align: right; }
    .card { background: #0f172a; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 0 12px rgba(0, 0, 0, 0.4); }
    .info { color: #94a3b8; font-size: 14px; margin-bottom: 15px; text-align: left; }
    
    /* Arabic Ayat Style - Placed at top */
    .arabic { font-size: 38px; direction: rtl; line-height: 2; margin-bottom: 20px; color: #f8fafc; text-align: center; font-family: "Traditional Arabic", serif; }
    
    .urdu { font-size: 20px; direction: rtl; line-height: 1.8; color: #93c5fd; margin-bottom: 20px; border-top: 1px solid #1e293b; padding-top: 15px; }
    .aiBox { background: #052e16; padding: 15px; border-left: 4px solid #22c55e; border-radius: 6px; margin-top: 15px; font-size: 16px; line-height: 1.6; text-align: left; color: #dcfce7; display: none; }
    .loader { border: 4px solid #333; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>قرآن سرچ</h1>
  <div class="search-box">
    <input id="topic" placeholder="مثلاً زکاة، روزہ، صبر">
    <button class="main-btn" onclick="searchTopic()">تلاش کریں</button>
  </div>

  <div id="results"></div>

  <script>
    async function searchTopic() {
      let topic = document.getElementById("topic").value;
      let container = document.getElementById("results");
      if (!topic) return;

      container.innerHTML = '<div class="loader"></div>';

      // We search using English keywords to get the best results from the Quran API
      let url = `https://api.alquran.cloud/v1/search/${topic}/all/en.sahih`;

      try {
        let res = await fetch(url);
        let data = await res.json();
        container.innerHTML = "";

        if (!data.data || data.data.matches.length === 0) {
          container.innerHTML = "<p>کوئی نتیجہ نہیں ملا۔</p>";
          return;
        }

        data.data.matches.slice(0, 5).forEach((ayah, index) => {
          let card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="info">سورۃ ${ayah.surah.englishName} (${ayah.surah.number}:${ayah.numberInSurah})</div>
            
            <div class="arabic">${ayah.text}</div>

            <div class="urdu" id="urdu${index}">ترجمہ لوڈ ہو رہا ہے...</div>

            <div style="margin-bottom:15px;">
              <audio controls src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayah.number}.mp3" style="width:100%"></audio>
            </div>

            <button onclick="explain('${topic}', ${index})" style="background:#1e293b; color:#3b82f6; border:1px solid #3b82f6; padding:8px 15px; border-radius:5px; cursor:pointer;">
              AI خلاصہ
            </button>

            <div class="aiBox" id="ai${index}"></div>
          `;
          container.appendChild(card);
          loadUrdu(ayah.number, index);
        });
      } catch (err) {
        container.innerHTML = "نیٹ ورک کا مسئلہ ہے۔";
      }
    }

    async function loadUrdu(number, index) {
      try {
        let res = await fetch(`https://api.alquran.cloud/v1/ayah/${number}/ur.jalandhry`);
        let data = await res.json();
        document.getElementById("urdu" + index).innerText = data.data.text;
      } catch (e) {
        document.getElementById("urdu" + index).innerText = "ترجمہ دستیاب نہیں ہے۔";
      }
    }

    async function explain(searchTopic, index) {
      let box = document.getElementById("ai" + index);
      box.style.display = "block";
      box.innerHTML = "AI تجزیہ کر رہا ہے...";

      try {
        let res = await fetch("/api/explain", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic: searchTopic })
        });
        let data = await res.json();
        box.innerHTML = data.explanation.replace(/\*\*/g, ""); 
      } catch (err) {
        box.innerHTML = "تشریح حاصل کرنے میں غلطی ہوئی۔";
      }
    }
  </script>
</body>
</html>
