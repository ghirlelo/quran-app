<!DOCTYPE html>
<html>

<head>
<title>AI Quran Search</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:20px;
}

input{
padding:14px;
width:300px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:14px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
margin-left:5px;
}

button:hover{
background:#1d4ed8;
}

.topics button{
margin:5px;
background:#16a34a;
}

#results{
margin-top:40px;
max-width:900px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.arabic{
font-size:28px;
direction:rtl;
margin-bottom:10px;
}

.urdu{
font-size:18px;
direction:rtl;
color:#93c5fd;
margin-bottom:10px;
}

.info{
font-size:14px;
color:#cbd5f5;
margin-bottom:10px;
}

.ai{
margin-top:10px;
color:#a7f3d0;
}

audio{
width:100%;
margin-top:10px;
}

.loader{
border:4px solid #333;
border-top:4px solid #3b82f6;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<h1>AI Quran Topic Search</h1>

<input id="topic" placeholder="Ask about zakat, roza, prayer">
<button onclick="searchTopic()">Search</button>

<div class="topics">
<button onclick="quick('zakat')">Zakat</button>
<button onclick="quick('fasting')">Roza</button>
<button onclick="quick('prayer')">Namaz</button>
<button onclick="quick('charity')">Charity</button>
</div>

<div id="results"></div>

<script>

function quick(word){
document.getElementById("topic").value = word
searchTopic()
}

async function searchTopic(){

let topic=document.getElementById("topic").value

let container=document.getElementById("results")

container.innerHTML='<div class="loader"></div>'

let url=`https://api.alquran.cloud/v1/search/${topic}/all/en`

let res=await fetch(url)

let data=await res.json()

container.innerHTML=""

data.data.matches.slice(0,5).forEach((ayah,index)=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="info">
Surah ${ayah.surah.englishName} (${ayah.surah.number}:${ayah.numberInSurah})
</div>

<div class="arabic">
${ayah.text}
</div>

<div class="urdu">
${ayah.translation || ""}
</div>

<button onclick="explain('${ayah.text}',${index})">
Explain AI
</button>

<div class="ai" id="ai${index}"></div>

<audio controls src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayah.number}.mp3"></audio>

`

container.appendChild(card)

})

}

async function explain(text,index){

let box=document.getElementById("ai"+index)

box.innerHTML="AI explaining..."

let res=await fetch("/api/explain",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
ayah:text
})

})

let data=await res.json()

box.innerHTML=data.explanation

}

</script>

</body>

</html>
