<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>Quran AI Search</title>
    <style>
        body { font-family: "Segoe UI", Arial; background: #020617; color: white; text-align: center; padding: 40px; }
        h1 { font-size: 32px; margin-bottom: 20px; color: #3b82f6; }
        .search-box { background: #0f172a; padding: 20px; border-radius: 12px; display: inline-block; margin-bottom: 30px; border: 1px solid #1e293b; }
        input { padding: 14px; width: 320px; font-size: 16px; border-radius: 8px; border: none; outline: none; background: #1e293b; color: white; }
        button.search-btn { padding: 14px 20px; font-size: 16px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; margin-left: 10px; }
        #results { max-width: 850px; margin: auto; text-align: right; }
        .card { background: #0f172a; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #1e293b; }
        .info { color: #94a3b8; font-size: 14px; margin-bottom: 15px; text-align: left; }
        .arabic { font-size: 36px; direction: rtl; line-height: 1.8; margin-bottom: 20px; color: #f8fafc; text-align: center; }
        .urdu { font-size: 20px; direction: rtl; line-height: 1.6; color: #93c5fd; margin-bottom: 15px; border-top: 1px solid #1e293b; padding-top: 15px; }
        .explain-btn { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .explain-btn:hover { background: #3b82f6; color: white; }
        .aiBox { background: #064e3b; padding: 15px; border-radius: 8px; margin-top: 15px; line-height: 1.6; color: #dcfce7; display: none; text-align: left; border-left: 4px solid #10b981; }
        .loader { border: 4px solid #333; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>قرآن اے آئی سرچ</h1>
    <div class="search-box">
        <input id="topic" placeholder="مثلاً نماز، صبر، زکوٰۃ">
        <button class="search-btn" onclick="searchTopic()">تلاش کریں</button>
    </div>
    <div id="results"></div>

    <script>
        async function searchTopic() {
            let topic = document.getElementById("topic").value;
            let container = document.getElementById("results");
            if (!topic) return;
            container.innerHTML = '<div class="loader"></div>';
            try {
                let res = await fetch(`https://api.alquran.cloud/v1/search/${topic}/all/en.sahih`);
                let data = await res.json();
                container.innerHTML = "";
                data.data.matches.slice(0, 5).forEach((ayah, index) => {
                    let card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <div class="info">Surah ${ayah.surah.englishName} (${ayah.surah.number}:${ayah.numberInSurah})</div>
                        <div class="arabic">${ayah.text}</div>
                        <div id="urdu${index}" class="urdu">ترجمہ لوڈ ہو رہا ہے...</div>
                        <button class="explain-btn" onclick="explain('${ayah.text.replace(/'/g, "\\'")}', ${index})">AI خلاصہ</button>
                        <div class="aiBox" id="ai${index}"></div>
                    `;
                    container.appendChild(card);
                    loadUrdu(ayah.number, index);
                });
            } catch (e) { container.innerHTML = "Error loading verses."; }
        }

        async function loadUrdu(number, index) {
            let res = await fetch(`https://api.alquran.cloud/v1/ayah/${number}/ur.jalandhry`);
            let data = await res.json();
            document.getElementById("urdu" + index).innerText = data.data.text;
        }

        async function explain(ayahText, index) {
            let topic = document.getElementById("topic").value;
            let box = document.getElementById("ai" + index);
            box.style.display = "block";
            box.innerHTML = "AI خلاصہ تیار کر رہا ہے...";
            let res = await fetch("/api/explain", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic: topic, ayah: ayahText })
            });
            let data = await res.json();
            box.innerHTML = data.explanation.replace(/\*\*/g, "");
        }
    </script>
</body>
</html>
